<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Day Hybrid Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --neon-green:#00ff88; --missed-red:#ff3e3e; --lavender:#d1c4e9; --dark-bg:#050505; --card-bg:#111; --blue:#3498db; }
        * { box-sizing:border-box; }
        body { background:var(--dark-bg); color:white; font-family:Inter,sans-serif; padding:20px; margin:0; }
        .container { max-width:1100px; margin:auto; }
        .main-header { text-align:center; padding:40px 0 20px; background:radial-gradient(circle at center,#1a1a1a 0%,var(--dark-bg) 70%); border-radius:20px; margin-bottom:20px; }
        .main-header h1 { font-size:clamp(1.5rem,8vw,2.5rem); font-weight:900; text-transform:uppercase; letter-spacing:-1px; margin:0; color:#fff; }
        .timeline-card { background:#111; padding:15px; border-radius:15px; border:1px solid #222; display:grid; grid-template-columns:1fr auto 1.2fr auto 1fr; align-items:center; margin-bottom:20px; }
        .date-box { text-align:center; }
        .date-box .label { font-size:0.55rem; color:#555; text-transform:uppercase; }
        .date-box .date-val { font-size:0.85rem; font-weight:800; }
        .top-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px; margin-bottom:25px; }
        .stat-card { background:var(--card-bg); padding:15px; border-radius:15px; border:1px solid #222; text-align:center; }
        .val { font-size:1.8rem; font-weight:900; color:var(--neon-green); margin:5px 0; }
        .label { font-size:0.65rem; color:#666; text-transform:uppercase; letter-spacing:1px; }
        .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
        .running-chart-container { background:var(--card-bg); padding:20px; border-radius:15px; border:1px solid #222; margin-bottom:30px; }
        .matrix { display:grid; grid-template-columns:repeat(10,1fr); gap:6px; margin-top:20px; }
        .day-card { aspect-ratio:1/1; background:#1a1a1a; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:1px solid #222; transition:transform 0.15s; position:relative; }
        .day-card:hover { transform:scale(1.12); z-index:2; }
        .day-card.completed { border-color:var(--neon-green); background:rgba(0,255,136,0.07); }
        .day-card.rest { border-color:var(--lavender); background:rgba(209,196,233,0.07); }
        .day-card.missed { border-color:var(--missed-red); background:rgba(255,62,62,0.07); }
        .day-card.future { opacity:0.25; cursor:default; }
        .day-card.future:hover { transform:none; }
        .day-card::after { content:attr(data-day); position:absolute; top:2px; right:4px; font-size:0.45rem; font-weight:800; color:rgba(255,255,255,0.2); pointer-events:none; }
        .day-icon { font-size:clamp(0.9rem,2.5vw,1.4rem); line-height:1; display:flex; flex-wrap:wrap; gap:1px; align-items:center; justify-content:center; padding:2px; }
        #modalOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; backdrop-filter:blur(8px); }
        #logModal { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; padding:25px; border-radius:20px; border:1px solid var(--neon-green); width:90%; max-width:400px; }
        .modal-item { margin-bottom:12px; }
        .modal-label { color:#555; font-size:0.6rem; text-transform:uppercase; font-weight:bold; }
        .modal-val { font-size:0.9rem; color:#ddd; white-space:pre-line; }
        #closeBtn { background:var(--neon-green); color:black; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; width:100%; margin-top:10px; }
        @media(max-width:600px){ .charts-grid{grid-template-columns:1fr;} .matrix{gap:4px;} }
    </style>
</head>
<body>
<div id="modalOverlay" onclick="closeModal()">
    <div id="logModal" onclick="event.stopPropagation()">
        <div style="color:var(--neon-green);font-weight:900;margin-bottom:15px;border-bottom:1px solid #222;padding-bottom:10px;">SESSION DETAILS</div>
        <div class="modal-item"><div class="modal-label">Day</div><div id="m-day" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Date</div><div id="m-date" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Activity</div><div id="m-act" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Performance</div><div id="m-perf" class="modal-val" style="color:var(--neon-green)"></div></div>
        <div class="modal-item"><div class="modal-label">Muscle Focus</div><div id="m-mus" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Details</div><div id="m-det" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Post Activity Feedback</div><div id="m-com" class="modal-val"></div></div>
        <button id="closeBtn" onclick="closeModal()">CLOSE</button>
    </div>
</div>
<div class="container">
    <header class="main-header"><h1>100 Day Hybrid Challenge</h1></header>
    <div class="timeline-card">
        <div class="date-box"><div class="label">Start</div><div id="start-date" class="date-val">-</div></div>
        <div style="color:#222">>></div>
        <div class="date-box" style="background:rgba(0,255,136,0.1);padding:5px 15px;border-radius:10px;"><div class="label">Today</div><div id="today-date" class="date-val">-</div></div>
        <div style="color:#222">>></div>
        <div class="date-box"><div class="label">Goal</div><div id="end-date" class="date-val">-</div></div>
    </div>
    <div class="top-stats">
        <div class="stat-card"><div class="label">Total Calories</div><div id="total-cal" class="val">0</div><div class="label">Kcal</div></div>
        <div class="stat-card"><div class="label">Total Time</div><div id="total-dur" class="val">0</div><div class="label">Mins</div></div>
        <div class="stat-card"><div class="label">Streak</div><div id="curr-streak" class="val">0</div><div class="label">Best: <span id="max-streak" style="color:var(--lavender)">0</span></div></div>
        <div class="stat-card"><div class="label">Days Left</div><div id="days-remaining" class="val">0</div><div class="label">to go</div></div>
    </div>
    <div class="charts-grid">
        <div class="stat-card"><div class="label">Muscle Balance</div><canvas id="muscleRadar"></canvas></div>
        <div class="stat-card"><div class="label">Activity Split</div><canvas id="activityPie"></canvas></div>
    </div>
    <div class="running-chart-container">
        <div class="label" style="margin-bottom:10px;">Running Performance History</div>
        <canvas id="runningChart" style="max-height:250px;"></canvas>
    </div>
    <div class="matrix" id="dayMatrix"></div>
</div>
<script>
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFHuEh8YaZrUW7H4YijeyEoWhLtigGxbmmDAblq-SoobT-RI1MO30Bu0t_zcOttpph-QrsJOxm_X3P/pub?output=csv';

var ICONS = { boxing:'🥊', gym:'🏋️', running:'🏃', cycling:'🚴', rest:'🔋', swimming:'🏊', yoga:'🧘', walking:'🚶', cricket:'🏏', cardio:'❤️', hiit:'⚡', pilates:'🤸', tennis:'🎾', football:'⚽', basketball:'🏀' };

function getIcon(a) { return ICONS[a.toLowerCase().trim()] || '⚡'; }

document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});

function parseRunning(details) {
    var parts = details.split('|');
    var dist=null, pace=null, hr=null;
    for (var p=0; p<parts.length; p++) {
        var part = parts[p].trim();
        var low = part.toLowerCase();
        if (low.indexOf('distance') === 0) {
            var m = part.match(/(\d+(\.\d+)?)\s*km/i);
            if (m) dist = parseFloat(m[1]);
        } else if (low.indexOf('pace') === 0) {
            var m2 = part.match(/(\d+):(\d+)/);
            if (m2) pace = parseFloat((parseInt(m2[1]) + parseInt(m2[2])/60).toFixed(2));
        } else if (low.indexOf('hr') === 0) {
            var m3 = part.match(/(\d+)\s*bpm/i);
            if (m3) hr = parseInt(m3[1]);
        }
    }
    return {dist:dist, pace:pace, hr:hr};
}

function processData(data) {
    var matrix = document.getElementById('dayMatrix');
    matrix.innerHTML = '';
    var muscleCounts={}, actCounts={};
    var totalCal=0, totalDur=0, currStreak=0, maxStreak=0, tempStreak=0, done=0;
    var runDates=[], runDist=[], runPace=[], runHR=[];

    for (var i=1; i<=100; i++) {
        var row = null;
        for (var d=0; d<data.length; d++) {
            if (String(Object.values(data[d])[0]).trim() === String(i)) { row=data[d]; break; }
        }
        var card = document.createElement('div');
        card.className = 'day-card';
        card.dataset.day = i;

        if (row) {
            var vals = Object.values(row);
            var date = vals[1]||'', actRaw = vals[2]||'';

            var statusIdx = -1;
            for (var si=3; si<vals.length; si++) {
                var sv = (vals[si]||'').trim().toLowerCase();
                if (sv==='completed' || sv==='missed') { statusIdx=si; break; }
            }

            var details = statusIdx>3 ? vals.slice(3,statusIdx).join(',') : (vals[3]||'');
            var status  = statusIdx>=0 ? (vals[statusIdx]||'').trim().toLowerCase() : '';
            var dur     = parseFloat(vals[statusIdx+1])||0;
            var cal     = parseFloat(vals[statusIdx+2])||0;
            var muscle  = vals[statusIdx+3]||'';
            var comment = vals[statusIdx+4]||'';

            if (status==='missed') {
                card.classList.add('missed');
                tempStreak=0;
                card.innerHTML='<div class="day-icon">❌</div>';
            } else if (status==='completed') {
                done++; tempStreak++; currStreak=tempStreak;
                if (tempStreak>maxStreak) maxStreak=tempStreak;
                totalCal+=cal; totalDur+=dur;
                var isRest = actRaw.toLowerCase().indexOf('rest')>=0;
                card.classList.add(isRest?'rest':'completed');
                var acts = actRaw.split(','), icons='';
                for (var ai=0;ai<acts.length;ai++) icons+=getIcon(acts[ai]);
                card.innerHTML='<div class="day-icon">'+icons+'</div>';
                if (!isRest) {
                    for (var ai2=0;ai2<acts.length;ai2++) { var a=acts[ai2].trim(); actCounts[a]=(actCounts[a]||0)+1; }
                    var ms=muscle.split(',');
                    for (var mi=0;mi<ms.length;mi++) { var tm=ms[mi].trim(); if(tm) muscleCounts[tm]=(muscleCounts[tm]||0)+1; }
                }
                if (actRaw.toLowerCase().indexOf('running')>=0) {
                    var rp=parseRunning(details);
                    if (rp.dist!==null||rp.pace!==null||rp.hr!==null) {
                        runDates.push(date); runDist.push(rp.dist); runPace.push(rp.pace); runHR.push(rp.hr);
                    }
                }
            } else {
                card.classList.add('future');
                card.innerHTML='<div class="day-icon" style="opacity:0.2">-</div>';
            }
            (function(ii,dd,ar,det,dr,cl,mu,co,st){
                card.onclick=function(){ openModal(ii,dd,ar,det,dr,cl,mu,co,st); };
            })(i,date,actRaw,details,dur,cal,muscle,comment,status);
        } else {
            card.classList.add('future');
            card.innerHTML='<div class="day-icon" style="opacity:0.15">-</div>';
        }
        matrix.appendChild(card);
    }

    document.getElementById('total-cal').innerText = Math.round(totalCal).toLocaleString();
    document.getElementById('total-dur').innerText = totalDur.toLocaleString();
    document.getElementById('curr-streak').innerText = currStreak;
    document.getElementById('max-streak').innerText = maxStreak;
    document.getElementById('days-remaining').innerText = 100-done;
    if (data.length>0) {
        document.getElementById('start-date').innerText = Object.values(data[0])[1]||'-';
        document.getElementById('end-date').innerText   = Object.values(data[data.length-1])[1]||'-';
    }
    initCharts(muscleCounts, actCounts, runDates, runDist, runPace, runHR);
}

function openModal(day,date,act,det,dur,cal,mus,com,status) {
    document.getElementById('m-day').innerText  = 'Day '+day;
    document.getElementById('m-date').innerText = date||'-';
    document.getElementById('m-act').innerText  = act||'Pending';
    document.getElementById('m-perf').innerText = status==='missed' ? 'Session missed' : 'Calories: '+cal+' kcal\nDuration: '+dur+' mins';
    document.getElementById('m-mus').innerText  = mus||'N/A';
    document.getElementById('m-det').innerText  = det||'-';
    document.getElementById('m-com').innerText  = com||'-';
    document.getElementById('modalOverlay').style.display='block';
}
function closeModal() { document.getElementById('modalOverlay').style.display='none'; }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });

function initCharts(m,a,rDate,r1,r2,r3) {
    new Chart(document.getElementById('muscleRadar'),{
        type:'radar',
        data:{ labels:Object.keys(m), datasets:[{data:Object.values(m),borderColor:'#00ff88',backgroundColor:'rgba(0,255,136,0.1)',pointBackgroundColor:'#00ff88'}]},
        options:{ responsive:true, plugins:{legend:{display:false}}, scales:{r:{ticks:{display:false},grid:{color:'#222'},pointLabels:{color:'#666',font:{size:10}}}}}
    });
    new Chart(document.getElementById('activityPie'),{
        type:'doughnut',
        data:{ labels:Object.keys(a), datasets:[{data:Object.values(a),backgroundColor:['#00ff88','#d1c4e9','#3498db','#e74c3c','#f1c40f','#9b59b6','#1abc9c'],borderWidth:0}]},
        options:{ responsive:true, plugins:{legend:{position:'bottom',labels:{color:'#666',boxWidth:8,font:{size:10}}}}}
    });
    new Chart(document.getElementById('runningChart'),{
        type:'line',
        data:{ labels:rDate, datasets:[
            {label:'Avg Pace (min/km)',data:r2,borderColor:'#3498db',backgroundColor:'rgba(52,152,219,0.1)',pointBackgroundColor:'#3498db',pointRadius:4,pointHoverRadius:6,tension:0.3,yAxisID:'yPace'},
            {label:'Avg Heart Rate (bpm)',data:r3,borderColor:'#ff3e3e',backgroundColor:'rgba(255,62,62,0.1)',pointBackgroundColor:'#ff3e3e',pointRadius:4,pointHoverRadius:6,tension:0.3,yAxisID:'yHR'}
        ]},
        options:{
            responsive:true,
            interaction:{mode:'index',intersect:false},
            scales:{
                x:{grid:{display:false},ticks:{color:'#555',font:{size:10}}},
                yPace:{type:'linear',position:'left',min:0,max:10,grid:{color:'#1a1a1a'},ticks:{color:'#3498db',font:{size:10},stepSize:1,callback:function(v){return v+' min';}},title:{display:true,text:'Avg Pace (min/km)',color:'#3498db',font:{size:10}}},
                yHR:{type:'linear',position:'right',min:120,max:180,grid:{drawOnChartArea:false},ticks:{color:'#ff3e3e',font:{size:10},stepSize:10,callback:function(v){return v+' bpm';}},title:{display:true,text:'Avg HR (bpm)',color:'#ff3e3e',font:{size:10}}}
            },
            plugins:{
                legend:{labels:{color:'#888',font:{size:11},boxWidth:12}},
                tooltip:{callbacks:{label:function(ctx){
                    var v=ctx.parsed.y, dist=r1[ctx.dataIndex];
                    if (ctx.datasetIndex===0) {
                        var mn=Math.floor(v), sc=String(Math.round((v-mn)*60)).padStart(2,'0');
                        return ' Pace: '+mn+':'+sc+'/km'+(dist!==null?' | Dist: '+dist+'km':'');
                    }
                    return ' HR: '+v+' bpm';
                }}}
            }
        }
    });
}

fetch(CSV_URL)
    .then(function(res){ return res.text(); })
    .then(function(csv){
        var result=Papa.parse(csv,{header:true,skipEmptyLines:true});
        console.log('Rows loaded:',result.data.length,'First row:',result.data[0]);
        processData(result.data);
    })
    .catch(function(err){
        console.error('Fetch failed, trying fallback:',err);
        Papa.parse(CSV_URL,{download:true,header:true,skipEmptyLines:true,
            complete:function(r){ processData(r.data); },
            error:function(e){ console.error('PapaParse fallback error:',e); }
        });
    });
</script>
</body>
</html>
