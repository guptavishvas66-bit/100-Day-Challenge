<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Day Hybrid Challenge | Pro Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --neon-green: #00ff88; --missed-red: #ff3e3e; --lavender: #d1c4e9; 
            --dark-bg: #050505; --card-bg: #111; --blue: #3498db;
        }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Header */
        .main-header { text-align: center; padding: 30px 0; background: radial-gradient(circle at center, #1a1a1a 0%, var(--dark-bg) 80%); border-radius: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .main-header h1 { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        .main-header .subtitle { color: var(--neon-green); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; font-weight: bold; margin-top: 5px; }

        /* Stats & Timeline */
        .top-row { display: grid; grid-template-columns: 1.5fr 3fr; gap: 15px; margin-bottom: 20px; }
        .timeline-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .date-box { text-align: center; }
        .date-box .label { font-size: 0.55rem; color: #555; text-transform: uppercase; }
        .date-box .date-val { font-size: 1rem; font-weight: 800; color: #fff; }

        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .val { font-size: 1.8rem; font-weight: 900; color: var(--neon-green); margin: 5px 0; }
        .label { font-size: 0.65rem; color: #666; text-transform: uppercase; font-weight: bold; }

        /* Charts */
        .charts-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; }

        /* 10x10 Matrix */
        .matrix { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin-top: 20px; }
        .day-card { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .day-card.completed { border-color: var(--neon-green); background: rgba(0,255,136,0.05); }
        .day-card.rest { border-color: var(--lavender); background: rgba(209,196,233,0.05); }
        .day-card.missed { border-color: var(--missed-red); background: rgba(255,62,62,0.05); }
        
        /* THE CHANGE: Massive icons, no number space */
        .day-icons { font-size: 2.1rem; }

        /* Modal */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(10px); }
        #logModal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--neon-green); width: 90%; max-width: 400px; box-shadow: 0 0 40px rgba(0,255,136,0.2); }
        .modal-label { color: #555; font-size: 0.6rem; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .modal-val { font-size: 1rem; color: #fff; margin-bottom: 15px; white-space: pre-line; }
        #closeBtn { background: var(--neon-green); color: black; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()">
    <div id="logModal" onclick="event.stopPropagation()">
        <div id="m-header" style="color:var(--neon-green); font-weight:900; font-size:1.2rem; margin-bottom:20px; border-bottom:1px solid #222; padding-bottom:10px;">SESSION REPORT</div>
        <div class="modal-label">Activity</div><div id="m-act" class="modal-val"></div>
        <div class="modal-label">Performance & Units</div><div id="m-perf" class="modal-val" style="color:var(--neon-green)"></div>
        <div class="modal-label">Muscle Focus</div><div id="m-mus" class="modal-val"></div>
        <div class="modal-label">Details / Coach Notes</div><div id="m-det" class="modal-val"></div>
        <button id="closeBtn" onclick="closeModal()">BACK TO COMMAND</button>
    </div>
</div>

<div class="container">
    <header class="main-header">
        <h1>100 Day Hybrid Challenge</h1>
        <div class="subtitle">Peak Performance Analytics</div>
    </header>

    <div class="top-row">
        <div class="timeline-card">
            <div class="date-box"><div class="label">Start</div><div id="start-date" class="date-val">—</div></div>
            <div style="color:#222; font-weight:900;">>></div>
            <div class="date-box"><div class="label">Goal</div><div id="end-date" class="date-val">—</div></div>
        </div>
        <div class="top-stats">
            <div class="stat-card"><div class="label">Total Burn</div><div id="total-cal" class="val">0</div><div class="label">kcal</div></div>
            <div class="stat-card"><div class="label">Total Time</div><div id="total-dur" class="val">0</div><div class="label">mins</div></div>
            <div class="stat-card"><div class="label">Streak</div><div id="curr-streak" class="val">0</div><div class="label">Best: <span id="max-streak" style="color:var(--lavender)">0</span></div></div>
            <div class="stat-card"><div class="label">Left</div><div id="days-remaining" class="val">0</div><div class="label">Days</div></div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-box"><div class="label" style="margin-bottom:10px">Muscle Load</div><canvas id="muscleRadar"></canvas></div>
        <div class="chart-box"><div class="label" style="margin-bottom:10px">Running Progression</div><canvas id="runningChart"></canvas></div>
    </div>

    <div class="matrix" id="dayMatrix"></div>
</div>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFHuEh8YaZrUW7H4YijeyEoWhLtigGxbmmDAblq-SoobT-RI1MO30Bu0t_zcOttpph-QrsJOxm_X3P/pub?gid=0&single=true&output=csv';

const iconMap = {
    'boxing': '🥊', 'gym': '🏋️', 'running': '🏃', 'cycling': '🚴', 'rest': '🔋', 'yoga': '🧘', 'missed': '❌'
};

Papa.parse(csvUrl, {
    download: true, header: true,
    complete: function(results) { processData(results.data); }
});

function processData(data) {
    const matrix = document.getElementById('dayMatrix');
    matrix.innerHTML = ''; 
    let muscleCounts = {};
    let totalCal = 0, totalDur = 0, currentStreak = 0, maxStreak = 0, tempStreak = 0, completedCount = 0;
    
    let runLabels = [], runDist = [], runPace = [], runHR = [];

    for (let i = 1; i <= 100; i++) {
        const row = data.find(r => Object.values(r)[0] == i);
        const card = document.createElement('div');
        card.className = 'day-card';
        
        if (row) {
            const vals = Object.values(row);
            // MAPPING STAYS THE SAME: A=0, B=1, C=2, D=3, E=4, F=5, G=6, H=7, I=8
            const date = vals[1], actStr = (vals[2] || '').trim(), details = vals[3] || '', status = (vals[4] || '').trim().toLowerCase();
            const dur = parseFloat(vals[5]) || 0, cal = parseFloat(vals[6]) || 0, muscleStr = vals[7] || '', comment = vals[8] || '';

            if (status === 'missed') {
                card.classList.add('missed');
                tempStreak = 0;
                card.innerHTML = `<div class="day-icons">❌</div>`;
            } else if (status === 'completed') {
                completedCount++;
                tempStreak++;
                currentStreak = tempStreak;
                if (tempStreak > maxStreak) maxStreak = tempStreak;

                totalCal += cal;
                totalDur += dur;

                const isRest = actStr.toLowerCase().includes('rest');
                card.classList.add(isRest ? 'rest' : 'completed');
                
                const activities = actStr.split(',').map(s => s.trim());
                let icons = activities.map(a => iconMap[a.toLowerCase()] || '⚡').join('');
                card.innerHTML = `<div class="day-icons">${icons}</div>`;

                if (!isRest) {
                    muscleStr.split(',').forEach(m => { 
                        let tm = m.trim(); 
                        if(tm) muscleCounts[tm] = (muscleCounts[tm] || 0) + 1; 
                    });
                }

                if (actStr.toLowerCase().includes('running')) {
                    const metrics = details.split(',').map(m => parseFloat(m.replace(/[^\d.]/g, '')) || 0);
                    runLabels.push(date);
                    runDist.push(metrics[0]);
                    runPace.push(metrics[1]);
                    runHR.push(metrics[2]);
                }
            } else {
                card.innerHTML = `<div class="day-icons" style="color:#222; font-size:1rem">•</div>`;
            }
            card.onclick = () => openModal(i, date, actStr, details, dur, cal, muscleStr, comment);
        } else {
            card.innerHTML = `<div class="day-icons" style="color:#222; font-size:1rem">•</div>`;
        }
        matrix.appendChild(card);
    }

    // Totals logic stays same
    document.getElementById('total-cal').innerText = Math.round(totalCal).toLocaleString();
    document.getElementById('total-dur').innerText = totalDur.toLocaleString();
    document.getElementById('curr-streak').innerText = currentStreak;
    document.getElementById('max-streak').innerText = maxStreak;
    document.getElementById('days-remaining').innerText = 100 - completedCount;
    document.getElementById('start-date').innerText = Object.values(data[0])[1];
    document.getElementById('end-date').innerText = Object.values(data[data.length-1])[1];

    initCharts(muscleCounts, runLabels, runDist, runPace, runHR);
}

function openModal(day, date, act, det, dur, cal, mus, com) {
    document.getElementById('m-header').innerText = `SESSION REPORT | DAY ${day}`;
    document.getElementById('m-act').innerText = act;
    document.getElementById('m-perf').innerText = `🔥 Burned: ${cal} kcal\n⏱ Duration: ${dur} mins`;
    document.getElementById('m-mus').innerText = mus || 'N/A';
    document.getElementById('m-det').innerText = `Logs: ${det}\n\nCoach's Note: ${com}`;
    document.getElementById('modalOverlay').style.display = 'block';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function initCharts(muscles, rDates, rDist, rPace, rHR) {
    new Chart(document.getElementById('muscleRadar'), {
        type: 'radar',
        data: {
            labels: Object.keys(muscles),
            datasets: [{ data: Object.values(muscles), borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', pointRadius: 0 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { r: { grid: { color: '#222' }, pointLabels: { color: '#555' }, ticks: { display: false } } } }
    });

    new Chart(document.getElementById('runningChart'), {
        type: 'line',
        data: {
            labels: rDates,
            datasets: [
                { label: 'Dist', data: rDist, borderColor: '#00ff88', yAxisID: 'y' },
                { label: 'Pace', data: rPace, borderColor: '#3498db', yAxisID: 'y1' }
            ]
        },
        options: {
            scales: {
                y: { type: 'linear', position: 'left', grid: { color: '#111' } },
                y1: { type: 'linear', position: 'right', grid: { display: false } }
            },
            plugins: { legend: { labels: { color: '#555', boxWidth: 10 } } }
        }
    });
}
</script>
</body>
</html>
