<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Day Hybrid Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --neon-green: #00ff88; 
            --missed-red: #ff3e3e; 
            --lavender: #d1c4e9; 
            --dark-bg: #050505; 
            --card-bg: #111;
            --border: #222;
        }

        body { 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            padding: 20px; 
            margin: 0; 
            line-height: 1.5;
        }

        .container { max-width: 1100px; margin: auto; }

        /* Header & Hero */
        .main-header {
            text-align: center;
            padding: 50px 0 30px;
            background: radial-gradient(circle at center, #161616 0%, var(--dark-bg) 100%);
        }

        .main-header h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .subtitle {
            color: var(--neon-green);
            font-size: 0.75rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* Timeline & Stats */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            transition: border-color 0.3s ease;
        }

        .timeline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            margin-bottom: 20px;
        }

        .date-label { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .date-val { font-size: 0.9rem; font-weight: 700; }
        .today { border: 1px solid var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }

        .val { font-size: 2.5rem; font-weight: 900; color: var(--neon-green); display: block; }
        .label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        /* Visuals */
        .charts-container { 
            display: grid; 
            grid-template-columns: 1.2fr 0.8fr; 
            gap: 20px; 
            margin-bottom: 30px; 
        }

        @media (max-width: 768px) { 
            .charts-container { grid-template-columns: 1fr; }
            .timeline { flex-direction: column; gap: 10px; }
        }

        /* Grid Matrix */
        .matrix { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 8px; 
        }

        .day-card { 
            aspect-ratio: 1/1; 
            background: #0d0d0d; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border: 1px solid var(--border); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .day-card:hover { transform: translateY(-3px); border-color: var(--neon-green); background: #161616; }
        .day-card.completed { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0, 255, 136, 0.03); }
        .day-card.rest { border-color: var(--lavender); color: var(--lavender); }
        .day-card.missed { border-color: var(--missed-red); color: var(--missed-red); }
        
        .day-num { font-weight: 800; font-size: 1.2rem; }
        .day-act { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; margin-top: 2px; }

        /* Modal Overlay */
        #modalOverlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); z-index: 1000; 
            backdrop-filter: blur(12px); 
            place-items: center;
        }
        
        #logModal { 
            background: #111; padding: 40px; border-radius: 24px; 
            border: 1px solid var(--neon-green); width: 90%; max-width: 450px; 
        }

        .modal-grid { display: grid; gap: 20px; margin: 20px 0; }
        .m-title { color: var(--neon-green); font-weight: 900; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        button { 
            background: var(--neon-green); color: #000; border: none; 
            padding: 15px; border-radius: 12px; font-weight: 800; 
            width: 100%; cursor: pointer; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()">
    <div id="logModal" onclick="event.stopPropagation()">
        <div class="m-title" id="m-header">DAY DETAILS</div>
        <div class="modal-grid">
            <div><div class="label">Activity</div><div id="m-act" style="font-weight: 700;"></div></div>
            <div><div class="label">Performance</div><div id="m-perf" style="white-space: pre-line; color: #bbb;"></div></div>
            <div><div class="label">Target Area</div><div id="m-mus" style="color: var(--lavender);"></div></div>
            <div><div class="label">Coach Insight</div><div id="m-com" style="font-style: italic; color: #888;"></div></div>
        </div>
        <button onclick="closeModal()">RETURN TO TRACKER</button>
    </div>
</div>

<div class="container">
    <header class="main-header">
        <h1>100 Day Hybrid</h1>
        <div class="subtitle">Peak Performance Tracking</div>
    </header>

    <div class="card timeline">
        <div class="date-group"><div class="date-label">Start</div><div id="start-date" class="date-val">—</div></div>
        <div style="color: #333; font-weight: 900;">⚡</div>
        <div class="date-group card today"><div class="date-label" style="color:inherit">Today</div><div id="today-date" class="date-val">—</div></div>
        <div style="color: #333; font-weight: 900;">⚡</div>
        <div class="date-group"><div class="date-label">Finish</div><div id="end-date" class="date-val">—</div></div>
    </div>

    <div class="stats-grid">
        <div class="card"><span class="label">Remaining</span><span id="days-remaining" class="val">0</span></div>
        <div class="card">
            <span class="label">Streak</span><span id="curr-streak" class="val">0</span>
            <span class="label" style="font-size:0.55rem">Best: <span id="max-streak" style="color:var(--lavender)">0</span></span>
        </div>
        <div class="card"><span class="label">Last Vibe</span><span id="mood-val" class="val" style="color:var(--lavender)">—</span></div>
    </div>

    <div class="charts-container">
        <div class="card"><canvas id="muscleRadar"></canvas></div>
        <div class="card"><canvas id="activityPie"></canvas></div>
    </div>

    <div class="matrix" id="dayMatrix"></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFHuEh8YaZrUW7H4YijeyEoWhLtigGxbmmDAblq-SoobT-RI1MO30Bu0t_zcOttpph-QrsJOxm_X3P/pub?gid=0&single=true&output=csv';

// Initialize App
document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

Papa.parse(CSV_URL, {
    download: true, header: true,
    complete: (results) => renderDashboard(results.data)
});

function renderDashboard(data) {
    const container = document.getElementById('dayMatrix');
    let stats = { completed: 0, currentStreak: 0, maxStreak: 0, tempStreak: 0, lastMood: "Neutral" };
    let muscleMap = {}, activityMap = { Boxing: 0, Gym: 0, Cycling: 0, Running: 0 };

    // Set Timeline Dates
    const startRow = data.find(r => Object.values(r)[0] == 1);
    const endRow = data.find(r => Object.values(r)[0] == 100);
    if(startRow) document.getElementById('start-date').innerText = Object.values(startRow)[1];
    if(endRow) document.getElementById('end-date').innerText = Object.values(endRow)[1];

    for (let i = 1; i <= 100; i++) {
        const row = data.find(r => Object.values(r)[0] == i);
        const card = document.createElement('div');
        card.className = 'day-card';
        
        if (row) {
            const v = Object.values(row);
            const [id, date, act, details, status, dur, cal, muscles, comment] = [v[0], v[1], v[2] || '', v[3], v[4]?.toLowerCase(), v[5], v[6], v[7], v[8]];

            if (act.toLowerCase() === 'missed') {
                card.classList.add('missed');
                stats.tempStreak = 0;
                card.innerHTML = `<div class="day-num">${i}</div><div class="day-act">MISS</div>`;
            } else if (status === 'completed') {
                stats.completed++;
                stats.tempStreak++;
                stats.currentStreak = stats.tempStreak;
                if (stats.tempStreak > stats.maxStreak) stats.maxStreak = stats.tempStreak;
                
                card.classList.add(act.toLowerCase() === 'rest' ? 'rest' : 'completed');
                card.innerHTML = `<div class="day-num">${i}</div><div class="day-act">${act}</div>`;
                
                // Track Analytics
                if (act.toLowerCase() !== 'rest') {
                    const normalizedAct = act.charAt(0).toUpperCase() + act.slice(1).toLowerCase();
                    if(activityMap.hasOwnProperty(normalizedAct)) activityMap[normalizedAct]++;
                    if(muscles) muscles.split(',').forEach(m => {
                        const cleanM = m.trim();
                        if(cleanM) muscleMap[cleanM] = (muscleMap[cleanM] || 0) + 1;
                    });
                }
                if (comment) stats.lastMood = comment.split(' ')[0];
            } else {
                card.innerHTML = `<div class="day-num" style="opacity:0.3">${i}</div>`;
            }
            card.onclick = () => openModal(i, date, act, details, dur, cal, muscles, comment);
        } else {
            card.innerHTML = `<div class="day-num" style="opacity:0.1">${i}</div>`;
        }
        container.appendChild(card);
    }

    // Update Header Stats
    document.getElementById('days-remaining').innerText = 100 - stats.completed;
    document.getElementById('curr-streak').innerText = stats.currentStreak;
    document.getElementById('max-streak').innerText = stats.maxStreak;
    document.getElementById('mood-val').innerText = stats.lastMood;
    
    initCharts(muscleMap, activityMap);
}

function openModal(day, date, act, det, dur, cal, mus, com) {
    document.getElementById('m-header').innerText = `DAY ${day} • ${date || 'TBD'}`;
    document.getElementById('m-act').innerText = act || 'Scheduled';
    document.getElementById('m-perf').innerText = `Duration: ${dur || '--'}\nBurn: ${cal || '--'} kcal\n\nNotes: ${det || 'No details logged.'}`;
    document.getElementById('m-mus').innerText = mus || 'General';
    document.getElementById('m-com').innerText = com || 'Keep pushing.';
    document.getElementById('modalOverlay').style.display = 'grid';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function initCharts(m, a) {
    const chartDefaults = { color: '#666', font: { family: 'Inter', size: 10 } };

    new Chart(document.getElementById('muscleRadar'), {
        type: 'radar',
        data: {
            labels: Object.keys(m),
            datasets: [{ data: Object.values(m), borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', borderWidth: 2, pointRadius: 0 }]
        },
        options: { 
            scales: { r: { grid: { color: '#222' }, angleLines: { color: '#222' }, ticks: { display: false }, pointLabels: chartDefaults } },
            plugins: { legend: { display: false } }
        }
    });

    new Chart(document.getElementById('activityPie'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(a),
            datasets: [{ data: Object.values(a), backgroundColor: ['#00ff88','#d1c4e9','#3498db','#ff3e3e'], borderWidth: 0, hoverOffset: 10 }]
        },
        options: { 
            cutout: '70%',
            plugins: { legend: { position: 'bottom', labels: chartDefaults } }
        }
    });
}
</script>
</body>
</html>
