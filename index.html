<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Day Hybrid Challenge | Pro Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-green: #00ff88; 
            --missed-red: #ff3e3e; 
            --lavender: #d1c4e9; 
            --dark-bg: #0a0a0a; 
            --card-bg: #141414; 
            --border-color: #222;
            --text-dim: #888;
        }

        body { 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            padding: 10px; 
            margin: 0; 
            line-height: 1.5;
        }

        .container { max-width: 1100px; margin: auto; }
        
        /* Header & Progress */
        .main-header { 
            text-align: center; 
            padding: 50px 20px; 
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--dark-bg) 100%);
            margin-bottom: 20px; 
        }
        .main-header h1 { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 900; letter-spacing: -2px; margin: 0; }
        .subtitle { color: var(--neon-green); font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; margin-top: 10px; }

        .progress-container { width: 100%; background: #1a1a1a; height: 6px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: var(--neon-green); transition: width 1s ease-in-out; box-shadow: 0 0 15px var(--neon-green); }

        /* Stats Grid */
        .top-stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        .stat-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: #333; }
        .val { font-size: 1.8rem; font-weight: 900; color: #fff; margin: 5px 0; }
        .label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }

        /* Charts Section */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); }

        /* The Matrix */
        .matrix { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); 
            gap: 10px; 
            margin-top: 20px; 
        }
        .day-card { 
            aspect-ratio: 1/1; 
            background: #111; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border: 1px solid var(--border-color); 
            transition: all 0.2s ease; 
        }
        .day-card:hover { border-color: #555; background: #1a1a1a; }
        .day-card.completed { border-color: var(--neon-green); background: rgba(0,255,136,0.03); }
        .day-card.rest { border-color: var(--lavender); opacity: 0.8; }
        .day-card.missed { border-color: var(--missed-red); }
        
        .day-num { font-weight: 700; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
        .day-act-icon { font-size: 1.3rem; }

        /* Modal Enhancements */
        #modalOverlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(12px); 
        }
        #logModal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #181818; padding: 30px; border-radius: 24px; 
            border: 1px solid #333; width: 90%; max-width: 450px; 
        }
        .modal-item { margin-bottom: 15px; }
        .modal-label { color: var(--text-dim); font-size: 0.6rem; text-transform: uppercase; margin-bottom: 4px; }
        .modal-val { font-size: 1rem; color: #fff; }
        #closeBtn { 
            background: white; color: black; border: none; padding: 14px; 
            border-radius: 12px; cursor: pointer; font-weight: 900; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()">
    <div id="logModal" onclick="event.stopPropagation()">
        <div id="modalHeader" style="color:var(--neon-green); font-size:1.2rem; font-weight:900; margin-bottom:20px;">SESSION DATA</div>
        <div class="modal-item"><div class="modal-label">Activity</div><div id="m-act" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Metabolic Impact</div><div id="m-perf" class="modal-val" style="color:var(--neon-green)"></div></div>
        <div class="modal-item"><div class="modal-label">Target Groups</div><div id="m-mus" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Notes</div><div id="m-det" class="modal-val" style="font-size: 0.85rem; line-height:1.4;"></div></div>
        <button id="closeBtn" onclick="closeModal()">DISMISS</button>
    </div>
</div>

<div class="container">
    <header class="main-header">
        <h1>100 DAY HYBRID</h1>
        <div class="subtitle">Peak Human Performance Protocol</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </header>

    <div class="top-stats">
        <div class="stat-card"><div class="label">Energy Burned</div><div id="total-cal" class="val">0</div><div class="label">Total Kcal</div></div>
        <div class="stat-card"><div class="label">Time Invested</div><div id="total-dur" class="val">0</div><div class="label">Total Mins</div></div>
        <div class="stat-card"><div class="label">Current Streak</div><div id="curr-streak" class="val" style="color:var(--neon-green)">0</div><div class="label">Days Solid</div></div>
        <div class="stat-card"><div class="label">Remaining</div><div id="days-remaining" class="val">0</div><div class="label">Days to Go</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-box"><div class="label" style="margin-bottom:15px;">Volume Distribution</div><canvas id="muscleRadar"></canvas></div>
        <div class="chart-box"><div class="label" style="margin-bottom:15px;">Activity Split</div><canvas id="activityPie"></canvas></div>
    </div>

    <div class="chart-box" style="margin-bottom:25px;">
        <div class="label" style="margin-bottom:15px;">Running Evolution (Distance vs Pace)</div>
        <canvas id="runningChart" style="max-height: 280px;"></canvas>
    </div>

    <div class="matrix" id="dayMatrix"></div>
</div>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFHuEh8YaZrUW7H4YijeyEoWhLtigGxbmmDAblq-SoobT-RI1MO30Bu0t_zcOttpph-QrsJOxm_X3P/pub?gid=0&single=true&output=csv';

const iconMap = {
    'boxing': '🥊', 'gym': '🏋️', 'running': '🏃', 'cycling': '🚴', 'rest': '🔋',
    'swimming': '🏊', 'yoga': '🧘', 'walking': '🚶', 'cardio': '❤️', 'missed': '❌'
};

Papa.parse(csvUrl, {
    download: true, header: true,
    complete: function(results) { processData(results.data); }
});

function processData(data) {
    const matrix = document.getElementById('dayMatrix');
    matrix.innerHTML = ''; 
    let muscleCounts = {}, activityCounts = {};
    let totalCal = 0, totalDur = 0, currentStreak = 0, maxStreak = 0, tempStreak = 0, completedCount = 0;
    
    let runDates = [], runMetric1 = [], runMetric2 = [], runMetric3 = [];

    for (let i = 1; i <= 100; i++) {
        const row = data.find(r => Object.values(r)[0] == i);
        const card = document.createElement('div');
        card.className = 'day-card';
        
        if (row) {
            const vals = Object.values(row);
            const date = vals[1], actRaw = vals[2] || '', details = vals[3] || '', status = (vals[4] || '').trim().toLowerCase();
            const dur = parseFloat(vals[5]) || 0, cal = parseFloat(vals[6]) || 0, muscleRaw = vals[7] || '', comment = vals[8] || '';

            if (status === 'missed') {
                card.classList.add('missed');
                tempStreak = 0; 
                card.innerHTML = `<div class="day-num">${i}</div><div class="day-act-icon">❌</div>`;
            } else if (status === 'completed') {
                completedCount++;
                tempStreak++;
                currentStreak = tempStreak;
                if (tempStreak > maxStreak) maxStreak = tempStreak;

                totalCal += cal;
                totalDur += dur;

                const isRest = actRaw.toLowerCase().includes('rest');
                card.classList.add(isRest ? 'rest' : 'completed');

                const activities = actRaw.split(',').map(s => s.trim());
                let cardIcons = activities.map(a => iconMap[a.toLowerCase()] || '⚡').join('');
                card.innerHTML = `<div class="day-num">${i}</div><div class="day-act-icon">${cardIcons}</div>`;

                if (!isRest) {
                    activities.forEach(a => { if(a) activityCounts[a] = (activityCounts[a] || 0) + 1; });
                    muscleRaw.split(',').forEach(m => {
                        const tm = m.trim(); if(tm) muscleCounts[tm] = (muscleCounts[tm] || 0) + 1;
                    });
                }

                if (actRaw.toLowerCase().includes('running')) {
                    const metrics = details.split(',').map(m => parseFloat(m.replace(/[^0-9.]/g, '')));
                    runDates.push(date);
                    runMetric1.push(metrics[0] || 0);
                    runMetric2.push(metrics[1] || 0);
                    runMetric3.push(metrics[2] || 0);
                }
            } else {
                card.innerHTML = `<div class="day-num">${i}</div>`;
            }
            card.onclick = () => openModal(i, date, actRaw, details, dur, cal, muscleRaw, comment);
        } else {
            card.innerHTML = `<div class="day-num">${i}</div>`;
        }
        matrix.appendChild(card);
    }

    // Update UI Stats
    document.getElementById('total-cal').innerText = Math.round(totalCal).toLocaleString();
    document.getElementById('total-dur').innerText = totalDur.toLocaleString();
    document.getElementById('curr-streak').innerText = currentStreak;
    document.getElementById('days-remaining').innerText = 100 - completedCount;
    document.getElementById('progress-bar').style.width = completedCount + '%';

    initCharts(muscleCounts, activityCounts, runDates, runMetric1, runMetric2, runMetric3);
}

function openModal(day, date, act, det, dur, cal, mus, com) {
    document.getElementById('m-act').innerText = act || 'Pending';
    document.getElementById('m-perf').innerText = `🔥 ${cal} kcal | ⏱ ${dur} mins`;
    document.getElementById('m-mus').innerText = mus || 'N/A';
    document.getElementById('m-det').innerText = `${det}\n\nCoach: ${com}`;
    document.getElementById('modalOverlay').style.display = 'block';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function initCharts(m, a, rDate, r1, r2, r3) {
    const chartDefaults = {
        color: '#888',
        font: { family: 'Inter' }
    };
    Chart.defaults.color = '#666';

    new Chart(document.getElementById('muscleRadar'), {
        type: 'radar',
        data: { 
            labels: Object.keys(m), 
            datasets: [{ data: Object.values(m), borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', borderWidth: 2, pointRadius: 0 }] 
        },
        options: { 
            plugins: { legend: { display: false } }, 
            scales: { r: { angleLines: { color: '#222' }, grid: { color: '#222' }, ticks: { display: false }, pointLabels: { font: { size: 10 } } } } 
        }
    });

    new Chart(document.getElementById('activityPie'), {
        type: 'doughnut',
        data: { 
            labels: Object.keys(a), 
            datasets: [{ data: Object.values(a), backgroundColor: ['#00ff88','#d1c4e9','#3498db','#ff3e3e','#f1c40f'], borderWidth: 0, hoverOffset: 10 }] 
        },
        options: { 
            cutout: '70%',
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 20, font: { size: 11 } } } } 
        }
    });

   // Running Comparison Chart with Dual Axis
new Chart(document.getElementById('runningChart'), {
    type: 'line',
    data: {
        labels: rDate,
        datasets: [
            { 
                label: 'Pace (min/km)', 
                data: r2, 
                borderColor: '#3498db', 
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                tension: 0.3,
                yAxisID: 'y', // Map to left axis
                fill: true
            },
            { 
                label: 'Heart Rate (bpm)', 
                data: r3, 
                borderColor: '#ff3e3e', 
                tension: 0.3,
                yAxisID: 'y1', // Map to right axis
                pointRadius: 4,
                pointBackgroundColor: '#ff3e3e'
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            x: { 
                grid: { display: false }, 
                ticks: { color: '#666' } 
            },
            y: { // Left Axis: Pace
                type: 'linear',
                display: true,
                position: 'left',
                min: 2,
                max: 8,
                title: { display: true, text: 'Pace', color: '#3498db' },
                grid: { color: '#1a1a1a' },
                ticks: { color: '#666' }
            },
            y1: { // Right Axis: Heart Rate
                type: 'linear',
                display: true,
                position: 'right',
                min: 120,
                max: 180,
                title: { display: true, text: 'Heart Rate', color: '#ff3e3e' },
                grid: { drawOnChartArea: false }, // Prevent grid lines from overlapping
                ticks: { color: '#666' }
            }
        },
        plugins: { 
            legend: { 
                labels: { color: '#888', boxWidth: 12 } 
            },
            tooltip: {
                mode: 'index',
                intersect: false
            }
        }
    }
});
}
</script>
</body>
</html>
