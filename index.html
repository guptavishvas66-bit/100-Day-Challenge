<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Day Hybrid Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --neon-green: #00ff88; 
            --missed-red: #ff3e3e; 
            --lavender: #d1c4e9; 
            --dark-bg: #050505; 
            --card-bg: #111; 
        }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        
        /* Header Section */
        .main-header {
            text-align: center;
            padding: 40px 0 20px 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--dark-bg) 70%);
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .main-header h1 {
            font-size: clamp(1.5rem, 8vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        .main-header .subtitle {
            color: var(--neon-green);
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Timeline Widget */
        .timeline-card { 
            background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222;
            display: grid; grid-template-columns: 1fr auto 1.2fr auto 1fr; align-items: center; margin-bottom: 20px;
        }
        .date-box { text-align: center; }
        .date-box .label { font-size: 0.55rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
        .date-box .date-val { font-size: 0.85rem; font-weight: 800; color: #fff; }
        .date-box.today { background: rgba(0, 255, 136, 0.1); padding: 10px; border-radius: 10px; border: 1px solid rgba(0, 255, 136, 0.3); }
        .date-box.today .date-val { color: var(--neon-green); font-size: 1rem; }
        .divider { color: #222; font-weight: 900; letter-spacing: -2px; font-size: 0.8rem; }

        /* Stats Section */
        .top-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .val { font-size: 2.2rem; font-weight: 900; color: var(--neon-green); margin: 5px 0; }
        .label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        /* Charts */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } }

        /* 10x10 Matrix */
        .matrix { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin-top: 20px; }
        .day-card { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .day-card:hover { transform: scale(1.1); border-color: var(--neon-green); z-index: 10; }
        .day-card.completed { border-color: var(--neon-green); background: rgba(0,255,136,0.05); }
        .day-card.rest { border-color: var(--lavender); background: rgba(209,196,233,0.05); }
        .day-card.missed { border-color: var(--missed-red); background: rgba(255,62,62,0.05); }
        .card-icon { font-size: 1.4rem; }

        /* Modal */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(8px); }
        #logModal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--neon-green); width: 90%; max-width: 400px; text-align: left; }
        #modalHeader { color: var(--neon-green); font-size: 1.2rem; font-weight: 900; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .modal-item { margin-bottom: 15px; }
        .modal-label { color: #555; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
        .modal-val { font-size: 1rem; color: #ddd; margin-top: 3px; white-space: pre-line; }
        #closeBtn { background: var(--neon-green); color: black; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()">
    <div id="logModal" onclick="event.stopPropagation()">
        <div id="modalHeader">SESSION DETAILS</div>
        <div class="modal-item"><div class="modal-label">Activity</div><div id="m-act" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Performance</div><div id="m-perf" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Muscle Focus</div><div id="m-mus" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Coach's Comments</div><div id="m-com" class="modal-val" style="font-style:italic"></div></div>
        <button id="closeBtn" onclick="closeModal()">BACK TO GRID</button>
    </div>
</div>

<div class="container">
    <header class="main-header">
        <h1>100 Day Hybrid Challenge</h1>
        <div class="subtitle">Discipline • Intensity • Recovery</div>
    </header>

    <div class="timeline-card">
        <div class="date-box"><div class="label">Initiated</div><div id="start-date" class="date-val">—</div></div>
        <div class="divider">>></div>
        <div class="date-box today"><div class="label">Today</div><div id="today-date" class="date-val">—</div></div>
        <div class="divider">>></div>
        <div class="date-box"><div class="label">Finish Line</div><div id="end-date" class="date-val">—</div></div>
    </div>

    <div class="top-stats">
        <div class="stat-card"><div class="label">Days Remaining</div><div id="days-remaining" class="val">0</div></div>
        <div class="stat-card">
            <div class="label">Current Streak</div><div id="curr-streak" class="val">0</div>
            <div class="label" style="font-size:0.6rem">Personal Best: <span id="max-streak" style="color:var(--lavender)">0</span></div>
        </div>
        <div class="stat-card"><div class="label">Vibe</div><div id="mood-val" class="val" style="color:var(--lavender)">—</div></div>
    </div>

    <div class="charts-grid">
        <div class="stat-card"><canvas id="muscleRadar"></canvas></div>
        <div class="stat-card"><canvas id="activityPie"></canvas></div>
    </div>

    <div class="matrix" id="dayMatrix"></div>
</div>

<script>
// REPLACE WITH YOUR PUBLISH-TO-WEB CSV LINK
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFHuEh8YaZrUW7H4YijeyEoWhLtigGxbmmDAblq-SoobT-RI1MO30Bu0t_zcOttpph-QrsJOxm_X3P/pub?gid=0&single=true&output=csv';

const activityLogos = { 'Boxing': '🥊', 'Gym': '🏋️', 'Running': '🏃', 'Cycling': '🚴', 'Rest': '🔋', 'Missed': '❌', 'Default': '·' };

// Set Today's Date
const todayDate = new Date();
document.getElementById('today-date').innerText = todayDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

Papa.parse(csvUrl, {
    download: true, header: true,
    complete: function(results) { processData(results.data); }
});

function processData(data) {
    const matrix = document.getElementById('dayMatrix');
    matrix.innerHTML = ''; 
    let muscleCounts = {}, activityCounts = { Boxing: 0, Gym: 0, Cycling: 0, Running: 0 };
    let currentStreak = 0, maxStreak = 0, tempStreak = 0, lastFeeling = "Steady", completedCount = 0;
    
    // Timeline Dates (A=0, B=1)
    const firstRow = data.find(r => Object.values(r)[0] == 1);
    const lastRow = data.find(r => Object.values(r)[0] == 100);
    if(firstRow) document.getElementById('start-date').innerText = Object.values(firstRow)[1];
    if(lastRow) document.getElementById('end-date').innerText = Object.values(lastRow)[1];

    for (let i = 1; i <= 100; i++) {
        const row = data.find(r => Object.values(r)[0] == i);
        const card = document.createElement('div');
        card.className = 'day-card';
        
        if (row) {
            const vals = Object.values(row);
            // MAPPING: A:0, B:1, C:2, D:3, E:4, F:5, G:6, H:7, I:8
            const date = vals[1], act = (vals[2] || '').trim(), details = vals[3] || '', status = (vals[4] || '').trim().toLowerCase();
            const duration = vals[5] || '--', calories = vals[6] || '--', muscleRaw = vals[7] || '', comment = vals[8] || '';

            const logo = activityLogos[act] || activityLogos['Default'];

            if (act.toLowerCase() === 'missed') {
                card.classList.add('missed'); tempStreak = 0;
                card.innerHTML = `<div class="card-icon">❌</div>`;
            } else if (status === 'completed') {
                completedCount++; tempStreak++; currentStreak = tempStreak;
                if (tempStreak > maxStreak) maxStreak = tempStreak;
                card.classList.add(act.toLowerCase() === 'rest' ? 'rest' : 'completed');
                card.innerHTML = `<div class="card-icon">${logo}</div>`;
                
                if (act.toLowerCase() !== 'rest') {
                    const cleanAct = act.charAt(0).toUpperCase() + act.slice(1).toLowerCase();
                    if(activityCounts.hasOwnProperty(cleanAct)) activityCounts[cleanAct]++;
                    if(muscleRaw) {
                        muscleRaw.split(',').forEach(m => { 
                            const tm = m.trim(); 
                            if(tm) muscleCounts[tm] = (muscleCounts[tm] || 0) + 1; 
                        });
                    }
                }
                if (comment) lastFeeling = comment.split(' ')[0];
            } else {
                card.innerHTML = `<div style="color:#333; font-size:0.5rem">${i}</div>`;
            }
            card.onclick = () => openModal(i, date, act, details, duration, calories, muscleRaw, comment);
        } else {
            card.innerHTML = `<div style="color:#222; font-size:0.5rem">${i}</div>`;
        }
        matrix.appendChild(card);
    }
    document.getElementById('days-remaining').innerText = 100 - completedCount;
    document.getElementById('curr-streak').innerText = currentStreak;
    document.getElementById('max-streak').innerText = maxStreak;
    document.getElementById('mood-val').innerText = lastFeeling;
    initCharts(muscleCounts, activityCounts);
}

function openModal(day, date, act, det, dur, cal, mus, com) {
    document.getElementById('modalHeader').innerText = `DAY ${day} | ${date || 'NO DATE'}`;
    document.getElementById('m-act').innerText = act || 'Pending';
    document.getElementById('m-perf').innerText = `⏱ Duration: ${dur}\n🔥 Burned: ${cal}\n\n📝 Notes: ${det}`;
    document.getElementById('m-mus').innerText = mus || 'N/A';
    document.getElementById('m-com').innerText = com || 'No comments.';
    document.getElementById('modalOverlay').style.display = 'block';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function initCharts(m, a) {
    new Chart(document.getElementById('muscleRadar'), {
        type: 'radar',
        data: {
            labels: Object.keys(m),
            datasets: [{ data: Object.values(m), borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)' }]
        },
        options: { plugins: { legend: { display: false } }, scales: { r: { ticks: { display: false }, grid: { color: '#222' }, pointLabels: { color: '#666', font: { size: 10 } } } } }
    });
    new Chart(document.getElementById('activityPie'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(a),
            datasets: [{ data: Object.values(a), backgroundColor: ['#00ff88','#d1c4e9','#3498db','#e74c3c'], borderWidth: 0 }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#666', boxWidth: 8, font: { size: 10 } } } } }
    });
}
</script>
</body>
</html>
