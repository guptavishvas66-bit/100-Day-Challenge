<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Day Hybrid Challenge | Pro Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --neon-green: #00ff88; --missed-red: #ff3e3e; --lavender: #d1c4e9; 
            --dark-bg: #050505; --card-bg: #111; --blue: #3498db;
        }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        
        .main-header { text-align: center; padding: 40px 0 20px; background: radial-gradient(circle at center, #1a1a1a 0%, var(--dark-bg) 70%); border-radius: 20px; margin-bottom: 20px; }
        .main-header h1 { font-size: clamp(1.5rem, 8vw, 2.5rem); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin: 0; color: #fff; }
        .main-header .subtitle { color: var(--neon-green); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; font-weight: bold; }

        .timeline-card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #222; display: grid; grid-template-columns: 1fr auto 1.2fr auto 1fr; align-items: center; margin-bottom: 20px; }
        .date-box { text-align: center; }
        .date-box .label { font-size: 0.55rem; color: #555; text-transform: uppercase; }
        .date-box .date-val { font-size: 0.85rem; font-weight: 800; }

        .top-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .val { font-size: 1.8rem; font-weight: 900; color: var(--neon-green); margin: 5px 0; }
        .label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .running-chart-container { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 30px; }

        /* Day Matrix — icon-only cards */
        .matrix {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            margin-top: 20px;
        }
        .day-card {
            aspect-ratio: 1 / 1;
            background: #1a1a1a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #222;
            transition: transform 0.15s, border-color 0.15s, background 0.15s;
            position: relative;
            overflow: hidden;
        }
        .day-card:hover { transform: scale(1.12); z-index: 2; }
        .day-card.completed { border-color: var(--neon-green); background: rgba(0,255,136,0.07); }
        .day-card.rest     { border-color: var(--lavender);    background: rgba(209,196,233,0.07); }
        .day-card.missed   { border-color: var(--missed-red);  background: rgba(255,62,62,0.07); }
        .day-card.future   { opacity: 0.25; cursor: default; }
        .day-card.future:hover { transform: none; }

        /* Single icon — fills the card nicely */
        .day-icon {
            font-size: clamp(0.9rem, 2.5vw, 1.4rem);
            line-height: 1;
            text-align: center;
            /* When multiple icons, stack them tighter */
            display: flex;
            flex-wrap: wrap;
            gap: 1px;
            align-items: center;
            justify-content: center;
            padding: 2px;
        }

        /* Tooltip on hover showing day number */
        .day-card::after {
            content: attr(data-day);
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 0.45rem;
            font-weight: 800;
            color: rgba(255,255,255,0.25);
            pointer-events: none;
        }

        /* Modal */
        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(8px); }
        #logModal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 20px; border: 1px solid var(--neon-green); width: 90%; max-width: 400px; }
        .modal-item { margin-bottom: 12px; }
        .modal-label { color: #555; font-size: 0.6rem; text-transform: uppercase; font-weight: bold; }
        .modal-val { font-size: 0.9rem; color: #ddd; white-space: pre-line; }
        #closeBtn { background: var(--neon-green); color: black; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        @media (max-width: 600px) {
            .charts-grid { grid-template-columns: 1fr; }
            .matrix { grid-template-columns: repeat(10, 1fr); gap: 4px; }
        }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()">
    <div id="logModal" onclick="event.stopPropagation()">
        <div id="modalHeader" style="color:var(--neon-green); font-weight:900; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px;">SESSION DETAILS</div>
        <div class="modal-item"><div class="modal-label">Day</div><div id="m-day" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Date</div><div id="m-date" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Activity</div><div id="m-act" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Performance</div><div id="m-perf" class="modal-val" style="color:var(--neon-green)"></div></div>
        <div class="modal-item"><div class="modal-label">Muscle Focus</div><div id="m-mus" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Details</div><div id="m-det" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Post Activity Feedback</div><div id="m-com" class="modal-val"></div></div>
        <button id="closeBtn" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<div class="container">
    <header class="main-header">
        <h1>100 Day Hybrid Challenge</h1>
        <div class="subtitle"></div>
    </header>

    <div class="timeline-card">
        <div class="date-box"><div class="label">Start</div><div id="start-date" class="date-val">—</div></div>
        <div style="color:#222">>></div>
        <div class="date-box" style="background:rgba(0,255,136,0.1); padding:5px 15px; border-radius:10px;"><div class="label">Today</div><div id="today-date" class="date-val">—</div></div>
        <div style="color:#222">>></div>
        <div class="date-box"><div class="label">Goal</div><div id="end-date" class="date-val">—</div></div>
    </div>

    <div class="top-stats">
        <div class="stat-card"><div class="label">Total Calories</div><div id="total-cal" class="val">0</div><div class="label">Kcal</div></div>
        <div class="stat-card"><div class="label">Total Time</div><div id="total-dur" class="val">0</div><div class="label">Mins</div></div>
        <div class="stat-card"><div class="label">Streak</div><div id="curr-streak" class="val">0</div><div class="label">Best: <span id="max-streak" style="color:var(--lavender)">0</span></div></div>
        <div class="stat-card"><div class="label">Days Left</div><div id="days-remaining" class="val">0</div><div class="label">to go</div></div>
    </div>

    <div class="charts-grid">
        <div class="stat-card"><div class="label">Muscle Balance</div><canvas id="muscleRadar"></canvas></div>
        <div class="stat-card"><div class="label">Activity Split</div><canvas id="activityPie"></canvas></div>
    </div>

    <div class="running-chart-container">
        <div class="label" style="margin-bottom:10px;">Running Performance History</div>
        <canvas id="runningChart" style="max-height:250px;"></canvas>
    </div>

    <div class="matrix" id="dayMatrix"></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFHuEh8YaZrUW7H4YijeyEoWhLtigGxbmmDAblq-SoobT-RI1MO30Bu0t_zcOttpph-QrsJOxm_X3P/pub?gid=0&single=true&output=csv';

const ICON_MAP = {
    boxing: '🥊', gym: '🏋️', running: '🏃', cycling: '🚴', rest: '🔋',
    swimming: '🏊', yoga: '🧘', walking: '🚶', cardio: '❤️‍🔥', missed: '❌',
    hiit: '⚡', pilates: '🤸', tennis: '🎾', football: '⚽', basketball: '🏀'
};

function getIcon(activity) {
    return ICON_MAP[activity.toLowerCase().trim()] || '⚡';
}

// Set today's display
document.getElementById('today-date').innerText =
    new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

// Fetch and parse CSV
Papa.parse(CSV_URL, {
    download: true,
    header: true,
    complete: ({ data }) => processData(data)
});

function processData(data) {
    const matrix = document.getElementById('dayMatrix');
    matrix.innerHTML = '';

    let muscleCounts = {}, activityCounts = {};
    let totalCal = 0, totalDur = 0;
    let currentStreak = 0, maxStreak = 0, tempStreak = 0, completedCount = 0;
    let runDates = [], runMetric1 = [], runMetric2 = [], runMetric3 = [];

    for (let i = 1; i <= 100; i++) {
        const row = data.find(r => Object.values(r)[0] == i);
        const card = document.createElement('div');
        card.className = 'day-card';
        card.dataset.day = i;

        if (row) {
            const vals    = Object.values(row);
            const date      = vals[1] || '';
            const actRaw    = vals[2] || '';
            // Details now uses pipe separators: "Distance - 5km | Pace - 7:33/km | HR - 173bpm"
            // No commas inside, so PapaParse reads it as a single column cleanly.
            const details   = vals[3] || '';
            const status    = (vals[4] || '').trim().toLowerCase();
            const dur       = parseFloat(vals[5]) || 0;
            const cal       = parseFloat(vals[6]) || 0;
            const muscleRaw = vals[7] || '';
            const comment   = vals[8] || '';

            if (status === 'missed') {
                card.classList.add('missed');
                tempStreak = 0;
                card.innerHTML = `<div class="day-icon">❌</div>`;

            } else if (status === 'completed') {
                completedCount++;
                tempStreak++;
                currentStreak = tempStreak;
                if (tempStreak > maxStreak) maxStreak = tempStreak;

                totalCal += cal;
                totalDur += dur;

                const isRest = actRaw.toLowerCase().includes('rest');
                card.classList.add(isRest ? 'rest' : 'completed');

                const activities = actRaw.split(',').map(s => s.trim()).filter(Boolean);
                const icons = activities.map(getIcon).join('');
                card.innerHTML = `<div class="day-icon">${icons}</div>`;

                if (!isRest) {
                    activities.forEach(a => {
                        activityCounts[a] = (activityCounts[a] || 0) + 1;
                    });
                    muscleRaw.split(',').forEach(m => {
                        const tm = m.trim();
                        if (tm) muscleCounts[tm] = (muscleCounts[tm] || 0) + 1;
                    });
                }

                if (actRaw.toLowerCase().includes('running')) {
                    // Format: "Distance - 5km | Pace - 7:33/km | HR - 173bpm"
                    const distMatch = details.match(/Distance\s*-\s*([\d.]+)\s*km/i);
                    const paceMatch = details.match(/Pace\s*-\s*(\d+):(\d+)\/km/i);
                    const hrMatch   = details.match(/HR\s*-\s*(\d+)\s*bpm/i);

                    const dist = distMatch ? parseFloat(distMatch[1]) : null;

                    let pace = null;
                    if (paceMatch) {
                        const mins = parseInt(paceMatch[1]) || 0;
                        const secs = parseInt(paceMatch[2]) || 0;
                        pace = parseFloat((mins + secs / 60).toFixed(2));
                    }

                    const hr = hrMatch ? parseInt(hrMatch[1]) : null;

                    if (dist !== null || pace !== null || hr !== null) {
                        runDates.push(date);
                        runMetric1.push(dist);
                        runMetric2.push(pace);
                        runMetric3.push(hr);
                    }
                }

            } else {
                // Future / unlogged day
                card.classList.add('future');
                card.innerHTML = `<div class="day-icon" style="opacity:0.2">·</div>`;
            }

            card.onclick = () => openModal(i, date, actRaw, details, dur, cal, muscleRaw, comment, status);

        } else {
            // No data row yet
            card.classList.add('future');
            card.innerHTML = `<div class="day-icon" style="opacity:0.15">·</div>`;
        }

        matrix.appendChild(card);
    }

    // Update stat cards
    document.getElementById('total-cal').innerText  = Math.round(totalCal).toLocaleString();
    document.getElementById('total-dur').innerText  = totalDur.toLocaleString();
    document.getElementById('curr-streak').innerText = currentStreak;
    document.getElementById('max-streak').innerText  = maxStreak;
    document.getElementById('days-remaining').innerText = 100 - completedCount;

    const firstDate = Object.values(data[0])[1];
    const lastDate  = Object.values(data[data.length - 1])[1];
    document.getElementById('start-date').innerText = firstDate || '—';
    document.getElementById('end-date').innerText   = lastDate  || '—';

    initCharts(muscleCounts, activityCounts, runDates, runMetric1, runMetric2, runMetric3);
}

function openModal(day, date, act, det, dur, cal, mus, com, status) {
    document.getElementById('m-day').innerText  = `Day ${day}`;
    document.getElementById('m-date').innerText = date || '—';
    document.getElementById('m-act').innerText  = act  || 'Pending';
    document.getElementById('m-perf').innerText = status === 'missed'
        ? '— Session missed —'
        : `🔥 Calories: ${cal} kcal\n⏱ Duration: ${dur} mins`;
    document.getElementById('m-mus').innerText  = mus || 'N/A';
    document.getElementById('m-det').innerText  =
        det || '—';
    document.getElementById('m-com').innerText  = com || '—';
    document.getElementById('modalOverlay').style.display = 'block';
}

function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
}

// Keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function initCharts(m, a, rDate, r1, r2, r3) {
    const chartDefaults = {
        responsive: true,
        animation: { duration: 600 }
    };

    // Muscle radar
    new Chart(document.getElementById('muscleRadar'), {
        type: 'radar',
        data: {
            labels: Object.keys(m),
            datasets: [{
                data: Object.values(m),
                borderColor: '#00ff88',
                backgroundColor: 'rgba(0,255,136,0.1)',
                pointBackgroundColor: '#00ff88'
            }]
        },
        options: {
            ...chartDefaults,
            plugins: { legend: { display: false } },
            scales: {
                r: {
                    ticks: { display: false },
                    grid: { color: '#222' },
                    pointLabels: { color: '#666', font: { size: 10 } }
                }
            }
        }
    });

    // Activity donut
    new Chart(document.getElementById('activityPie'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(a),
            datasets: [{
                data: Object.values(a),
                backgroundColor: ['#00ff88','#d1c4e9','#3498db','#e74c3c','#f1c40f','#9b59b6','#1abc9c'],
                borderWidth: 0
            }]
        },
        options: {
            ...chartDefaults,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: '#666', boxWidth: 8, font: { size: 10 } }
                }
            }
        }
    });

    // Running Performance — bar (distance) + dual-axis lines (pace left, HR right)
    new Chart(document.getElementById('runningChart'), {
        type: 'line',
        data: {
            labels: rDate,
            datasets: [
                {
                    label: 'Avg Pace (min/km)',
                    data: r2,
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52,152,219,0.1)',
                    pointBackgroundColor: '#3498db',
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    tension: 0.3,
                    yAxisID: 'yPace',
                    order: 1
                },
                {
                    label: 'Avg Heart Rate (bpm)',
                    data: r3,
                    borderColor: '#ff3e3e',
                    backgroundColor: 'rgba(255,62,62,0.1)',
                    pointBackgroundColor: '#ff3e3e',
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    tension: 0.3,
                    yAxisID: 'yHR',
                    order: 2
                }
            ]
        },
        options: {
            responsive: true,
            animation: { duration: 600 },
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { color: '#555', font: { size: 10 } }
                },
                yPace: {
                    type: 'linear',
                    position: 'left',
                    min: 0,
                    max: 10,
                    grid: { color: '#1a1a1a' },
                    ticks: {
                        color: '#3498db',
                        font: { size: 10 },
                        stepSize: 1,
                        callback: v => v + ' min'
                    },
                    title: {
                        display: true,
                        text: 'Avg Pace (min/km)',
                        color: '#3498db',
                        font: { size: 10 }
                    }
                },
                yHR: {
                    type: 'linear',
                    position: 'right',
                    min: 120,
                    max: 180,
                    grid: { drawOnChartArea: false },
                    ticks: {
                        color: '#ff3e3e',
                        font: { size: 10 },
                        stepSize: 10,
                        callback: v => v + ' bpm'
                    },
                    title: {
                        display: true,
                        text: 'Avg HR (bpm)',
                        color: '#ff3e3e',
                        font: { size: 10 }
                    }
                }
            },
            plugins: {
                legend: {
                    labels: { color: '#888', font: { size: 11 }, boxWidth: 12 }
                },
                tooltip: {
                    callbacks: {
                        label: ctx => {
                            const v = ctx.parsed.y;
                            const i = ctx.datasetIndex;
                            const dist = r1[ctx.dataIndex];
                            if (i === 0) {
                                const mins = Math.floor(v);
                                const secs = String(Math.round((v - mins) * 60)).padStart(2, '0');
                                return [` Pace: ${mins}:${secs}/km`, dist != null ? ` Distance: ${dist} km` : ''];
                            }
                            if (i === 1) return ` HR: ${v} bpm`;
                        }
                    }
                }
            }
        }
    }));
}
</script>
</body>
</html>
