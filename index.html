<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Day Hybrid Challenge | Pro Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-green: #00ff88; --missed-red: #ff3e3e; --lavender: #d1c4e9; 
            --dark-bg: #0a0a0a; --card-bg: #141414; --border-color: #222; --text-dim: #888;
        }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; padding: 10px; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        .main-header { text-align: center; padding: 40px 20px 20px 20px; background: radial-gradient(circle at center, #1a1a1a 0%, var(--dark-bg) 100%); }
        .main-header h1 { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 900; letter-spacing: -2px; margin: 0; }
        .progress-container { width: 100%; background: #1a1a1a; height: 6px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: var(--neon-green); transition: width 1s ease-in-out; box-shadow: 0 0 15px var(--neon-green); }
        .top-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); }
        .val { font-size: 1.8rem; font-weight: 900; color: #fff; margin: 5px 0; }
        .label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); }
        .matrix { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin-top: 20px; }
        .day-card { aspect-ratio: 1/1; background: #111; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border-color); position: relative; transition: all 0.2s ease; }
        .day-card.completed { border-color: var(--neon-green); background: rgba(0,255,136,0.03); }
        .day-card.rest { border-color: var(--lavender); opacity: 0.8; }
        .day-card.missed { border-color: var(--missed-red); }
        .day-num { position: absolute; top: 4px; right: 6px; font-weight: 700; font-size: 0.55rem; color: #444; }
        .day-act-icon { font-size: 1.8rem; }
        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(12px); }
        #logModal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #181818; padding: 30px; border-radius: 24px; border: 1px solid #333; width: 90%; max-width: 450px; }
        .modal-item { margin-bottom: 15px; }
        .modal-label { color: var(--text-dim); font-size: 0.6rem; text-transform: uppercase; margin-bottom: 4px; }
        .modal-val { font-size: 1rem; color: #fff; white-space: pre-line; }
        #closeBtn { background: white; color: black; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 900; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()">
    <div id="logModal" onclick="event.stopPropagation()">
        <div id="modalHeader" style="color:var(--neon-green); font-size:1.2rem; font-weight:900; margin-bottom:20px;">SESSION DATA</div>
        <div class="modal-item"><div class="modal-label">Activity</div><div id="m-act" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Impact</div><div id="m-perf" class="modal-val" style="color:var(--neon-green)"></div></div>
        <div class="modal-item"><div class="modal-label">Target Groups</div><div id="m-mus" class="modal-val"></div></div>
        <div class="modal-item"><div class="modal-label">Notes</div><div id="m-det" class="modal-val"></div></div>
        <button id="closeBtn" onclick="closeModal()">DISMISS</button>
    </div>
</div>

<div class="container">
    <header class="main-header">
        <h1>100 DAY HYBRID</h1>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </header>

    <div class="top-stats">
        <div class="stat-card"><div class="label">Energy Burned</div><div id="total-cal" class="val">0</div><div class="label">Total Kcal</div></div>
        <div class="stat-card">
            <div class="label">Workout Duration</div>
            <div id="total-dur" class="val">0</div>
            <div class="label">Total Hrs</div>
        </div>
        <div class="stat-card">
            <div class="label">Current Streak</div>
            <div id="curr-streak" class="val" style="color:var(--neon-green)">0</div>
            <div class="label">Days Solid | Best: <span id="max-streak" style="color:var(--lavender)">0</span></div>
        </div>
        <div class="stat-card"><div class="label">Remaining</div><div id="days-remaining" class="val">0</div><div class="label">Days to Go</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-box"><div class="label" style="margin-bottom:15px;">Volume Distribution</div><canvas id="muscleRadar"></canvas></div>
        <div class="chart-box"><div class="label" style="margin-bottom:15px;">Activity Split</div><canvas id="activityPie"></canvas></div>
    </div>

    <div class="chart-box" style="margin-bottom:25px;">
        <div class="label" style="margin-bottom:15px;">Running Evolution (Pace vs HR)</div>
        <canvas id="runningChart" style="max-height: 280px;"></canvas>
    </div>

    <div class="matrix" id="dayMatrix"></div>
</div>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTFHuEh8YaZrUW7H4YijeyEoWhLtigGxbmmDAblq-SoobT-RI1MO30Bu0t_zcOttpph-QrsJOxm_X3P/pub?gid=0&single=true&output=csv';

const iconMap = {
    'boxing': '🥊', 'gym': '🏋️', 'running': '🏃', 'cycling': '🚴', 'rest': '🔋',
    'swimming': '🏊', 'yoga': '🧘', 'walking': '🚶', 'cardio': '❤️', 'missed': '❌', 'cricket': '🏏'
};

Papa.parse(csvUrl, {
    download: true, header: true,
    complete: function(results) { processData(results.data); }
});

function processData(data) {
    const matrix = document.getElementById('dayMatrix');
    matrix.innerHTML = ''; 
    let muscleCounts = {}, activityCounts = {};
    let totalCal = 0, totalDur = 0, currentStreak = 0, maxStreak = 0, tempStreak = 0, completedCount = 0;
    let runDates = [], runPace = [], runHR = [];

    for (let i = 1; i <= 100; i++) {
        const row = data.find(r => Object.values(r)[0] == i);
        const card = document.createElement('div');
        card.className = 'day-card';
        
        if (row) {
            const vals = Object.values(row);
            const date = vals[1], actRaw = vals[2] || '', details = vals[3] || '', status = (vals[4] || '').trim().toLowerCase();
            const dur = parseFloat(vals[5]) || 0, cal = parseFloat(vals[6]) || 0, muscleRaw = vals[7] || '', comment = vals[8] || '';

            if (status === 'missed') {
                card.classList.add('missed');
                tempStreak = 0; 
                card.innerHTML = `<div class="day-num">${i}</div><div class="day-act-icon">❌</div>`;
            } else if (status === 'completed') {
                completedCount++;
                tempStreak++;
                currentStreak = tempStreak;
                if (tempStreak > maxStreak) maxStreak = tempStreak;
                totalCal += cal;
                totalDur += dur;

                const isRest = actRaw.toLowerCase().includes('rest');
                card.classList.add(isRest ? 'rest' : 'completed');

                const activities = actRaw.split(',').map(s => s.trim());
                let cardIcons = activities.map(a => iconMap[a.toLowerCase()] || '⚡').join('');
                card.innerHTML = `<div class="day-num">${i}</div><div class="day-act-icon">${cardIcons}</div>`;

                if (!isRest) {
                    activities.forEach(a => { if(a) activityCounts[a] = (activityCounts[a] || 0) + 1; });
                    muscleRaw.split(',').forEach(m => {
                        const tm = m.trim(); if(tm) muscleCounts[tm] = (muscleCounts[tm] || 0) + 1;
                    });
                }

                if (actRaw.toLowerCase().includes('running')) {
                    const parts = details.split('|');
                    const extract = (label) => {
                        const part = parts.find(p => p.includes(label));
                        if (!part) return 0;
                        let cleaned = part.split('-')[1].replace(/[a-zA-Z\/]/g, '').trim();
                        if (cleaned.includes(':')) {
                            const [min, sec] = cleaned.split(':');
                            return parseFloat(min) + (parseFloat(sec || 0) / 60);
                        }
                        return parseFloat(cleaned);
                    };
                    runDates.push(date);
                    runPace.push(extract('Pace'));
                    runHR.push(extract('HR'));
                }
            } else {
                card.innerHTML = `<div class="day-num">${i}</div>`;
            }
            card.onclick = () => openModal(i, date, actRaw, details, dur, cal, muscleRaw, comment);
        } else {
            card.innerHTML = `<div class="day-num">${i}</div>`;
        }
        matrix.appendChild(card);
    }

    document.getElementById('total-cal').innerText = Math.round(totalCal).toLocaleString();
    document.getElementById('total-dur').innerText = (totalDur / 60).toFixed(1);
    document.getElementById('curr-streak').innerText = currentStreak;
    document.getElementById('max-streak').innerText = maxStreak;
    document.getElementById('days-remaining').innerText = 100 - completedCount;
    document.getElementById('progress-bar').style.width = completedCount + '%';

    initCharts(muscleCounts, activityCounts, runDates, runPace, runHR);
}

function openModal(day, date, act, det, dur, cal, mus, com) {
    document.getElementById('m-act').innerText = act || 'Pending';
    document.getElementById('m-perf').innerText = `🔥 ${cal} kcal | ⏱ ${(dur/60).toFixed(1)} hrs`;
    document.getElementById('m-mus').innerText = mus || 'N/A';
    document.getElementById('m-det').innerText = `${det}\n\nPost activity feedback: ${com}`;
    document.getElementById('modalOverlay').style.display = 'block';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function initCharts(m, a, rDate, rPace, rHR) {
    new Chart(document.getElementById('muscleRadar'), {
        type: 'radar',
        data: { labels: Object.keys(m), datasets: [{ data: Object.values(m), borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', borderWidth: 2, pointRadius: 0 }] },
        options: { plugins: { legend: { display: false } }, scales: { r: { angleLines: { color: '#222' }, grid: { color: '#222' }, ticks: { display: false } } } }
    });
    new Chart(document.getElementById('activityPie'), {
        type: 'doughnut',
        data: { labels: Object.keys(a), datasets: [{ data: Object.values(a), backgroundColor: ['#00ff88','#d1c4e9','#3498db','#ff3e3e','#f1c40f'], borderWidth: 0 }] },
        options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, color: '#666' } } } }
    });
    new Chart(document.getElementById('runningChart'), {
    type: 'line',
    data: {
        labels: rDate,
        datasets: [
            { 
                label: 'Pace', 
                data: rPace, 
                borderColor: '#3498db', 
                yAxisID: 'yPace', 
                tension: 0.4,
                pointRadius: 4
            },
            { 
                label: 'HR', 
                data: rHR, 
                borderColor: '#ff3e3e', 
                yAxisID: 'yHR', 
                tension: 0.4,
                pointRadius: 4
            }
        ]
    },
    options: {
        responsive: true, 
        maintainAspectRatio: false,
        interaction: {
            mode: 'index',
            intersect: false,
        },
        scales: {
            yPace: { 
                type: 'linear', 
                position: 'left', 
                min: 2, 
                max: 8, 
                title: { 
                    display: true, 
                    text: 'Pace (min/km)', // Added Unit
                    color: '#3498db',
                    font: { size: 10, weight: 'bold' }
                }, 
                grid: { color: '#1a1a1a' } 
            },
            yHR: { 
                type: 'linear', 
                position: 'right', 
                min: 120, 
                max: 180, 
                title: { 
                    display: true, 
                    text: 'Heart Rate (bpm)', // Added Unit
                    color: '#ff3e3e',
                    font: { size: 10, weight: 'bold' }
                }, 
                grid: { display: false } 
            },
            x: { grid: { display: false } }
        },
        plugins: {
            legend: { align: 'end', labels: { color: '#666', boxWidth: 12 } },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        let label = context.dataset.label || '';
                        let value = context.parsed.y;

                        if (label === 'Pace') {
                            // Convert decimal (e.g. 7.55) to 7'33''
                            const mins = Math.floor(value);
                            const secs = Math.round((value - mins) * 60);
                            return `Pace: ${mins}'${secs.toString().padStart(2, '0')}'' per km`;
                        }
                        return `${label}: ${Math.round(value)} bpm`;
                    }
                }
            }
        }
    }
});
}
</script>
</body>
</html>
